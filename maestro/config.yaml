# Maestro E2E configuration for Ninhao mobile app
# Run with: maestro test maestro/flows/
#
# Prerequisites:
# 1. Backend: make up && make migrate-fresh (or make seed)
# 2. Dev build: npx expo run:ios  OR  npx expo run:android
# 3. Maestro CLI: curl -Ls "https://get.maestro.mobile.dev" | bash

appId: com.omtglobal.ninhaomaniya
env:
  # API URL is set by app in __DEV__: localhost (iOS) / 10.0.2.2 (Android)
